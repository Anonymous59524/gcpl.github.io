<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gully Cricket Premier League</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
color:white;
text-align:center;
background:url("https://images.unsplash.com/photo-1540747913346-19e32dc3e97e") no-repeat center center/cover;
min-height:100vh;
overflow-x:hidden;
}

/* DARK OVERLAY */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,40,0.75);
z-index:-1;
}

/* LIVE CLOCK */

.clock{
position:fixed;
top:10px;
width:100%;
text-align:center;
font-size:20px;
font-weight:600;
letter-spacing:2px;
background:rgba(0,0,0,0.4);
padding:8px;
backdrop-filter:blur(4px);
}

/* HEADER */

header{
padding:80px 20px 30px 20px;
}

.logo{
width:180px;
max-width:80%;
margin-bottom:20px;
}

h1{
font-size:40px;
font-weight:700;
}

.play{
font-size:30px;
font-weight:700;
color:#38bdf8;
margin-top:8px;
}

/* VOTE BUTTON */

.vote-section{
margin-top:40px;
}

.vote-btn{
display:inline-block;
padding:18px 45px;
background:#38bdf8;
color:#000;
font-size:20px;
font-weight:600;
border-radius:40px;
text-decoration:none;
position:relative;
overflow:hidden;
}

.vote-btn span{
animation:moveText 2s infinite linear;
}

@keyframes moveText{
0%{transform:translateX(-10px);}
50%{transform:translateX(10px);}
100%{transform:translateX(-10px);}
}

.vote-text{
margin-top:12px;
font-size:16px;
}

/* VIDEO */

.video-section{
margin-top:80px;
display:flex;
justify-content:center;
padding:20px;
}

video{
width:90%;
max-width:850px;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,0.8);
}

/* CRICKET BALL ANIMATION */

.ball{
position:fixed;
width:50px;
animation:moveBall linear infinite;
}

.ball1{
top:30%;
animation-duration:12s;
}

.ball2{
top:60%;
animation-duration:15s;
}

@keyframes moveBall{
0%{
left:-100px;
transform:rotate(0deg);
}
100%{
left:110%;
transform:rotate(720deg);
}
}

/* FOOTER */

footer{
margin-top:100px;
padding:20px;
background:rgba(0,0,0,0.6);
font-size:14px;
}

</style>

</head>

<body>

<!-- LIVE CLOCK -->

<div class="clock" id="clock"></div>

<!-- CRICKET BALLS -->

<img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Cricket_ball.png" class="ball ball1">

<img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Cricket_ball.png" class="ball ball2">

<header>

<img src="logo.png" class="logo">

<h1>Gully Cricket Premier League</h1>

<div class="play">#PLAY</div>

<div class="vote-section">

<a href="https://docs.google.com/forms/d/e/1FAIpQLSe50iPXmjmJOmMkzwhzXwZ3-k6HvA0EipZYWy4OjLesHChAlA/closedform" class="vote-btn">

<span>VOTE NOW</span>

</a>

<div class="vote-text">
GCPL Official Awards (-∞ to 2025]
</div>

</div>

</header>

<section class="video-section">

<video width="100%" controls>

<source src="./intro.mp4" type="video/mp4">

Your browser does not support the video tag.

</video>

</section>

<footer>

Developed by Adarsh Kumar

</footer>

<script>

/* LIVE CLOCK */

function updateClock(){

const now = new Date();

const date = now.toLocaleDateString();

const time = now.toLocaleTimeString();

document.getElementById("clock").innerHTML = date + " | " + time;

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>

</html>
