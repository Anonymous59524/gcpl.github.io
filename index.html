<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gully Cricket Premier League</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
color:white;
text-align:center;
background:url("https://images.unsplash.com/photo-1540747913346-19e32dc3e97e") no-repeat center/cover;
min-height:100vh;
overflow-x:hidden;
}

/* DARK OVERLAY */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,40,0.75);
z-index:-1;
}

/* CLOCK */

.clock{
position:fixed;
top:10px;
width:100%;
text-align:center;
font-size:18px;
font-weight:600;
background:rgba(0,0,0,0.4);
padding:6px;
}

/* HEADER */

header{
padding:90px 20px 30px 20px;
}

.logo{
width:170px;
margin-bottom:15px;
}

h1{
font-size:40px;
}

.play{
font-size:32px;
font-weight:bold;
color:#38bdf8;
margin-top:8px;
}

/* SMALL MUSIC BUTTON */

.music-btn{
display:inline-block;
margin-left:15px;
padding:8px 16px;
background:#111;
border-radius:20px;
font-size:14px;
text-decoration:none;
color:white;
border:1px solid #38bdf8;
}

/* VOTE BUTTON */

.vote-section{
margin-top:40px;
}

.vote-btn{
display:inline-block;
padding:18px 45px;
background:#38bdf8;
color:black;
font-size:20px;
font-weight:600;
border-radius:40px;
text-decoration:none;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
box-shadow:0 0 10px #38bdf8;
}
to{
box-shadow:0 0 25px #38bdf8;
}
}

.vote-text{
margin-top:10px;
}

/* IMAGE SECTION */

.pic-section{
margin-top:80px;
display:flex;
justify-content:center;
}

.pic-section img{
width:90%;
max-width:800px;
border-radius:15px;
box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

/* CRICKET BALL */

.ball{
position:fixed;
width:65px;
animation:moveBall linear infinite;
}

.ball1{
top:30%;
animation-duration:12s;
}

.ball2{
top:60%;
animation-duration:15s;
}

@keyframes moveBall{
0%{left:-100px;}
100%{left:110%;}
}

/* PLAYERS SECTION */

.players{
margin-top:120px;
padding:40px;
background:rgba(0,0,0,0.5);
}

.players h2{
margin-bottom:20px;
font-size:32px;
}

.category{
margin-top:25px;
font-size:20px;
color:#38bdf8;
}

.players p{
margin-top:8px;
font-size:18px;
}

/* FOOTER */

footer{
margin-top:80px;
padding:20px;
background:rgba(0,0,0,0.6);
font-size:14px;
}

</style>

</head>

<body>

<div class="clock" id="clock"></div>

<img src="ball.png" class="ball ball1">
<img src="ball.png" class="ball ball2">

<header>

<img src="logo.png" class="logo">

<h1>Gully Cricket Premier League 
<a href="intro.mp4" class="music-btn">Music Video</a>
</h1>

<div class="play"><b>#PLAY</b></div>

<div class="vote-section">

<a href="https://docs.google.com/forms/d/e/1FAIpQLSe50iPXmjmJOmMkzwhzXwZ3-k6HvA0EipZYWy4OjLesHChAlA/closedform" class="vote-btn">
VOTE NOW
</a>

<div class="vote-text">
GCPL Official Awards (-∞ to 2025]
</div>

</div>

</header>

<!-- IMAGE SECTION -->

<section class="pic-section">

<img src="aipic.png">

</section>

<!-- PLAYERS SECTION -->

<section class="players">

<h2>Our Players</h2>

<div class="category">Batters</div>
<p>Soumyadeep D, Atik, Deeptanu</p>

<div class="category">Bowlers</div>
<p>Souradeep, Rudransh, Adriraj</p>

<div class="category">All Rounders</div>
<p>Ayush, Imtiaj, Soumyadeep B, Nabadeep, Aritra, Adarsh</p>

</section>

<footer>
Developed by Adarsh Kumar
</footer>

<script>

function updateClock(){
const now=new Date();
document.getElementById("clock").innerHTML=
now.toLocaleDateString()+" | "+now.toLocaleTimeString();
}

setInterval(updateClock,1000);
updateClock();

</script>

</body>

</html>
