}

/* Match Grid */

.matches{
display:flex;
justify-content:center;

}

/* Match Card */

.match-card{

background:#1e293b;
width:300px;
padding:20px;
border-radius:15px;
cursor:pointer;
transition:0.3s;

}

.match-card:hover{
transform:scale(1.05);
}

.teams{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.info{
font-size:14px;
opacity:0.8;
}

</style>

</head>
